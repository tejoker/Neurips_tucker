version: '3.8'

services:
  # GPU-enabled service for production workloads
  tuckercam-gpu:
    build:
      context: .
      target: production
    image: tuckercam:cuda
    container_name: tuckercam-gpu
    volumes:
      - ./data:/app/data
      - ./results:/app/results
      - ./logs:/app/logs
      - ./config:/app/config
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - OMP_NUM_THREADS=8
      - TUCKER_CAM_GPU_ENABLED=true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles:
      - gpu
    networks:
      - tuckercam-net

  # CPU-only service for development/testing
  tuckercam-cpu:
    build:
      context: .
      target: cpu-base
    image: tuckercam:cpu
    container_name: tuckercam-cpu
    volumes:
      - ./data:/app/data
      - ./results:/app/results
      - ./logs:/app/logs
      - ./config:/app/config
    environment:
      - CUDA_VISIBLE_DEVICES=""
      - OMP_NUM_THREADS=4
      - TUCKER_CAM_GPU_ENABLED=false
    profiles:
      - cpu
    networks:
      - tuckercam-net

  # Jupyter notebook service for interactive analysis
  tuckercam-notebook:
    build:
      context: .
      target: production
    image: tuckercam:cuda
    container_name: tuckercam-notebook
    ports:
      - "8888:8888"
    volumes:
      - ./data:/app/data
      - ./results:/app/results
      - ./logs:/app/logs
      - ./config:/app/config
      - ./notebooks:/app/notebooks
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - TUCKER_CAM_GPU_ENABLED=true
    command: >
      bash -c "pip install jupyterlab &&
               jupyter lab --ip=0.0.0.0 --port=8888 --no-browser
               --allow-root --NotebookApp.token='' --NotebookApp.password=''"
    profiles:
      - jupyter
    networks:
      - tuckercam-net

  # Monitoring service
  monitor:
    image: prom/prometheus:latest
    container_name: tuckercam-monitor
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    profiles:
      - monitoring
    networks:
      - tuckercam-net

networks:
  tuckercam-net:
    driver: bridge

volumes:
  tuckercam-data:
  tuckercam-results:
  tuckercam-logs:
